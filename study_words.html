<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordWise — Слова тижня</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & base ─────────────────────────────────────────────── */
:root {
  --ink:#1a1a2e; --paper:#f5f0e8; --cream:#ede8da;
  --gold:#c9a84c; --gold-light:#e8d5a3;
  --sage:#6b8f71; --terra:#c4614a;
  --muted:#7a7065; --line:#d4cdc0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.45;}

/* ─── Header ────────────────────────────────────────────────────── */
header{
  width:100%;max-width:700px;padding:32px 24px 0;
  display:flex;justify-content:space-between;align-items:baseline;
}
.logo{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:-.5px;}
.logo em{color:var(--gold);font-style:italic;}
.logo small{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:8px;letter-spacing:.06em;}
.today-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* ─── Tabs ──────────────────────────────────────────────────────── */
.tabs-bar{width:100%;max-width:700px;padding:0 24px;}
.tabs{display:flex;border-bottom:1.5px solid var(--line);margin-top:20px;}
.tab{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;cursor:pointer;color:var(--muted);border:none;background:none;
  border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .2s;
  display:inline-flex;flex-direction:column;align-items:center;gap:4px;}
.tab.active{color:var(--ink);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--ink);}
.tab-icon{font-size:16px;line-height:1;}
.tab-lbl{font-size:9px;}

/* ─── Main content ──────────────────────────────────────────────── */
main{width:100%;max-width:700px;padding:24px 24px 80px;display:flex;flex-direction:column;gap:16px;}
.view{display:none;flex-direction:column;gap:16px;animation:fadeUp .3s ease;}
.view.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ─── Cards ─────────────────────────────────────────────────────── */
.card{background:white;border:1.5px solid var(--line);border-radius:4px;padding:22px;box-shadow:3px 3px 0 var(--cream);}

/* ─── Buttons ───────────────────────────────────────────────────── */
.btn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  padding:10px 18px;border:1.5px solid var(--ink);border-radius:4px;
  background:var(--ink);color:var(--paper);cursor:pointer;
  transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-sm{padding:7px 12px;font-size:10px;}
.btn-outline{background:transparent;color:var(--ink);}
.btn-outline:hover{background:var(--ink);color:var(--paper);}
.btn-ghost{background:none;border-color:var(--line);color:var(--muted);}
.btn-ghost:hover{border-color:var(--gold);color:var(--ink);background:white;}
.icon-btn{background:none;border:1.5px solid var(--line);border-radius:50%;
  width:28px;height:28px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;color:var(--muted);flex-shrink:0;padding:0;transition:all .15s;}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);}
.icon-btn.playing{border-color:var(--sage);color:var(--sage);background:#e8f5eb;}
.icon-btn.danger:hover{border-color:var(--terra);color:var(--terra);background:#fdf0ee;}

/* ─── Section label ─────────────────────────────────────────────── */
.slabel{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);margin-bottom:8px;}
.divider{height:1px;background:var(--line);margin:14px 0;}

/* ════════════════════════════════════════════════════════
   WEEKLY VIEW
════════════════════════════════════════════════════════ */
.week-pill{font-family:'DM Mono',monospace;font-size:10px;
  background:var(--gold-light);color:var(--ink);padding:3px 10px;border-radius:20px;letter-spacing:.06em;}

/* Days strip */
.days-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-top:14px;}
.daydot{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:36px;}
.daydot .dl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;}
.daydot .dc{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted);transition:all .15s;background:white;}
.daydot.sel .dc{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600;}
.daydot.today:not(.sel) .dc{border-color:var(--ink);color:var(--ink);}
.daydot.fut{opacity:.38;pointer-events:none;}

/* Word slots */
.wslot{border:1.5px solid var(--line);border-radius:4px;padding:14px 16px;
  background:var(--paper);display:flex;align-items:flex-start;gap:10px;
  transition:border-color .15s;animation:fadeUp .25s ease;}
.wslot:hover{border-color:var(--gold-light);}
.wslot.empty{border-style:dashed;background:transparent;align-items:center;}
.wslot-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--line);min-width:16px;padding-top:3px;}
.wslot-body{flex:1;cursor:pointer;}
.wslot-en{font-family:'Playfair Display',serif;font-size:21px;line-height:1;}
.wslot-pos{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.09em;margin-top:2px;}
.wslot-uk{font-size:13px;color:var(--muted);font-style:italic;margin-top:4px;}
.wslot-detail{border-top:1px solid var(--line);margin-top:10px;padding-top:10px;}
.wslot-detail p{font-size:13px;line-height:1.6;}
.wslot-detail .ex{font-style:italic;color:var(--muted);border-left:3px solid var(--gold-light);padding-left:8px;margin-top:8px;font-size:12px;line-height:1.5;}
.wslot-actions{display:flex;align-items:center;gap:6px;padding-top:2px;}
.empty-label{font-size:14px;color:var(--muted);font-style:italic;}

/* Add panel */
.add-panel{background:white;border:1.5px solid var(--line);border-radius:4px;padding:18px 20px;box-shadow:3px 3px 0 var(--cream);}
.search-row{position:relative;}
.search-row svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-inp{width:100%;padding:9px 12px 9px 32px;border:1.5px solid var(--line);border-radius:4px;
  font-family:'DM Sans',sans-serif;font-size:14px;background:var(--paper);outline:none;transition:border-color .2s;}
.search-inp:focus{border-color:var(--gold);}
.search-inp:disabled{opacity:.4;cursor:not-allowed;}
.add-results{margin-top:8px;display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;}
.add-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border:1px solid var(--line);border-radius:4px;background:var(--paper);gap:10px;transition:all .12s;}
.add-row:hover{background:white;border-color:var(--gold-light);}
.add-row-en{font-family:'Playfair Display',serif;font-size:17px;}
.add-row-uk{font-size:12px;color:var(--muted);font-style:italic;}
.add-badge{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.04em;
  padding:2px 6px;border-radius:3px;background:var(--gold-light);color:var(--ink);}
.hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:center;padding:12px;}

/* ════════════════════════════════════════════════════════
   QUIZ VIEW
════════════════════════════════════════════════════════ */
.qwrap{display:flex;flex-direction:column;gap:16px;}

/* Setup */
.setup-card{background:white;border:1.5px solid var(--line);border-radius:4px;padding:26px;box-shadow:3px 3px 0 var(--cream);}
.setup-h{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px;}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.mchip{border:1.5px solid var(--line);border-radius:4px;padding:14px 8px;cursor:pointer;
  background:white;text-align:center;transition:all .15s;}
.mchip.active{background:var(--ink);border-color:var(--ink);color:white;}
.mchip:hover:not(.active){border-color:var(--gold);}
.mchip svg{display:block;margin:0 auto 8px;}
.mchip-lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;line-height:1.4;}
.src-row{display:flex;gap:8px;margin-bottom:20px;}
.schip{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  padding:7px 14px;border:1.5px solid var(--line);border-radius:20px;cursor:pointer;
  background:white;color:var(--muted);transition:all .15s;}
.schip.active{background:var(--ink);border-color:var(--ink);color:white;}
.schip:hover:not(.active){border-color:var(--gold);color:var(--ink);}
.stats-row{display:flex;gap:10px;margin-bottom:20px;}
.sbox{flex:1;text-align:center;padding:12px 8px;background:var(--paper);border:1px solid var(--line);border-radius:4px;}
.sbox .n{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);}
.sbox .l{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}

/* Question card */
.qcard{background:white;border:1.5px solid var(--line);border-radius:4px;padding:26px;box-shadow:3px 3px 0 var(--cream);}
.pbar{width:100%;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease;}
.qnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:right;margin:6px 0 20px;}
.qhint{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center;margin-bottom:14px;}
.qword-en{font-family:'Playfair Display',serif;font-size:44px;line-height:1;text-align:center;}
.qword-uk{font-family:'Playfair Display',serif;font-size:32px;font-style:italic;color:var(--sage);text-align:center;}
.qword-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
.qphon{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px;}
.qinput{width:100%;font-family:'DM Sans',sans-serif;font-size:17px;padding:12px;
  border:1.5px solid var(--line);border-radius:4px;background:var(--paper);outline:none;text-align:center;transition:border-color .2s;}
.qinput:focus{border-color:var(--gold);}
.qfb{padding:10px 16px;border-radius:4px;font-family:'DM Mono',monospace;font-size:13px;
  text-align:center;animation:fadeUp .25s ease;margin-top:12px;line-height:1.5;}
.qfb.ok{background:#e8f5eb;color:var(--sage);border:1px solid var(--sage);}
.qfb.no{background:#fdf0ee;color:var(--terra);border:1px solid var(--terra);}
.qnav{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}

/* Mic */
.mic-area{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0 4px;}
.mic-btn{width:66px;height:66px;border-radius:50%;border:none;cursor:pointer;
  background:var(--ink);color:white;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 14px rgba(26,26,46,.2);}
.mic-btn:hover{background:var(--gold);color:var(--ink);}
.mic-btn.on{background:var(--terra);animation:micPulse 1s ease infinite;}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(196,97,74,.5)}70%{box-shadow:0 0 0 14px rgba(196,97,74,0)}100%{box-shadow:0 0 0 0 rgba(196,97,74,0)}}
.mic-heard{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;min-height:26px;text-align:center;}
.mic-status{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;}

/* Result */
.result-card{background:white;border:1.5px solid var(--line);border-radius:4px;
  padding:40px 28px;box-shadow:3px 3px 0 var(--cream);text-align:center;}
.result-emoji{font-size:52px;margin-bottom:12px;}
.result-pct{font-family:'Playfair Display',serif;font-size:56px;}
.result-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin:8px 0 6px;}
.result-rec{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.06em;margin-bottom:28px;}

@media(max-width:500px){
  header{padding:20px 16px 0;}
  .logo{font-size:20px;}
  .logo small{display:none;}
  main{padding:16px 12px 80px;}
  .card{padding:16px 14px;box-shadow:none;}
  .mode-grid{grid-template-columns:1fr;}
  .qword-en{font-size:32px;}
  .qword-uk{font-size:24px;}
  .stats-row{flex-wrap:wrap;}

  /* ── Tabs: рівномірно по всій ширині ── */
  .tabs-bar{padding:0 12px;}
  .tabs{flex-wrap:nowrap;}
  .tab{flex:1;padding:8px 2px;letter-spacing:0;}
  .tab-icon{font-size:18px;}
  .tab-lbl{font-size:8px;}

  /* ── Irregular verbs: stack into cards ── */
  .iv-table thead{display:none;}
  .iv-table,.iv-table tbody{display:block;}
  .iv-table tr{display:block;}
  .iv-table tr.iv-letter-row td{display:block;padding:0;}
  .iv-table tr:not(.iv-letter-row){
    display:block;
    padding:10px 14px;
    border-bottom:1px solid var(--cream);
  }
  .iv-table tr:not(.iv-letter-row) td{display:inline;padding:0;}
  .iv-table tr:not(.iv-letter-row) td:nth-child(2)::before{content:" · ";color:var(--line);}
  .iv-table tr:not(.iv-letter-row) td:nth-child(3)::before{content:" · ";color:var(--line);}
  .iv-table tr:not(.iv-letter-row) td:nth-child(4){display:block;margin-top:3px;}
  .iv-form{font-size:14px;}
  .iv-base{font-size:18px;}

  /* ── Інше ── */
  .add-panel{padding:14px;}
  .arc-stats{flex-wrap:wrap;}
  .arc-week-hdr{padding:12px 14px;}
  .arc-word-row{padding:8px 14px;}
  .wl-grid{grid-template-columns:1fr 1fr;}
  .setup-card{padding:18px 16px;}
  .qcard{padding:18px 16px;}
  .src-row{flex-wrap:wrap;}
}

/* ════ ARCHIVE ════ */
.arc-empty{text-align:center;padding:48px 24px;font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--muted);}
.arc-stats{display:flex;gap:10px;margin-bottom:4px;}
.arc-stat{flex:1;background:white;border:1.5px solid var(--line);border-radius:4px;padding:14px;text-align:center;box-shadow:2px 2px 0 var(--cream);}
.arc-stat .n{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);}
.arc-stat .l{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-top:2px;}

.arc-week{background:white;border:1.5px solid var(--line);border-radius:4px;overflow:hidden;box-shadow:2px 2px 0 var(--cream);}
.arc-week-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;cursor:pointer;transition:background .15s;user-select:none;}
.arc-week-hdr:hover{background:var(--paper);}
.arc-week-hdr .wlabel{font-family:'Playfair Display',serif;font-size:17px;}
.arc-week-hdr .wmeta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.arc-week-hdr .wcount{background:var(--gold-light);color:var(--ink);padding:2px 7px;border-radius:10px;font-size:9px;}
.arc-week-body{display:none;border-top:1px solid var(--line);}
.arc-week-body.open{display:block;}
.arc-word-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 18px;border-bottom:1px solid var(--line);gap:10px;}
.arc-word-row:last-child{border-bottom:none;}
.arc-word-en{font-family:'Playfair Display',serif;font-size:17px;display:flex;align-items:center;gap:7px;}
.arc-word-uk{font-size:12px;font-style:italic;color:var(--muted);}
.arc-word-pos{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

.arc-toolbar{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-bottom:4px;}
.arc-filter{font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;
  border:1.5px solid var(--line);border-radius:4px;background:white;color:var(--ink);
  cursor:pointer;outline:none;}
.arc-filter:focus{border-color:var(--gold);}
.arc-search{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;
  border:1.5px solid var(--line);border-radius:4px;background:white;color:var(--ink);
  outline:none;flex:1;max-width:200px;}
.arc-search:focus{border-color:var(--gold);}
.del-week-btn{background:none;border:none;cursor:pointer;color:var(--line);font-size:16px;padding:0 2px;transition:color .15s;}
.del-week-btn:hover{color:var(--terra);}


/* ════ WORDS LIST ════ */
.wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.wl-card{background:white;border:1.5px solid var(--line);border-radius:4px;padding:12px 14px;
  transition:all .15s;display:flex;flex-direction:column;gap:2px;}
.wl-card:hover{border-color:var(--gold);box-shadow:2px 2px 0 var(--cream);}
.wl-en{font-family:'Playfair Display',serif;font-size:18px;line-height:1.1;
  display:flex;align-items:center;gap:6px;}
.wl-pos{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);
  text-transform:uppercase;letter-spacing:.08em;}
.wl-uk{font-size:12px;color:var(--muted);font-style:italic;line-height:1.35;}
.wl-week-badge{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.06em;padding:2px 6px;border-radius:3px;
  background:var(--gold-light);color:var(--ink);align-self:flex-start;margin-top:3px;}

/* pagination */
.pager{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;}
.pg-btn{font-family:'DM Mono',monospace;font-size:11px;
  padding:7px 11px;border:1.5px solid var(--line);border-radius:4px;
  background:white;color:var(--muted);cursor:pointer;transition:all .15s;min-width:36px;text-align:center;}
.pg-btn:hover:not(:disabled){border-color:var(--gold);color:var(--ink);}
.pg-btn.active{background:var(--ink);border-color:var(--ink);color:white;}
.pg-btn:disabled{opacity:.35;cursor:default;}
.pg-ellipsis{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);padding:0 4px;}
.pg-info{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:center;}

@media(max-width:480px){
  .wl-grid{grid-template-columns:1fr 1fr;}
}


/* ════ IRREGULAR VERBS ════ */
.iv-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.iv-table{width:100%;border-collapse:collapse;}
.iv-table thead th{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 10px;border-bottom:1.5px solid var(--line);text-align:left;}
.iv-table tbody tr{border-bottom:1px solid var(--cream);transition:background .12s;}
.iv-table tbody tr:hover{background:white;}
.iv-table tbody tr:last-child{border-bottom:none;}
.iv-table td{padding:9px 10px;font-size:14px;vertical-align:middle;}
.iv-table td:not(:last-child){white-space:nowrap;}
.iv-table td:not(:last-child) .iv-base,
.iv-table td:not(:last-child) .iv-form{margin-right:4px;}
.iv-base{font-family:'Playfair Display',serif;font-size:18px;}
.iv-form{font-family:'DM Mono',monospace;font-size:14px;color:var(--ink);}
.iv-uk{font-size:12px;color:var(--muted);font-style:italic;}
.iv-letter-hdr{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);padding:14px 10px 4px;border-bottom:1px solid var(--gold-light);}
.iv-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

/* ── Settings ── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
.settings-row:last-child{border-bottom:none;padding-bottom:0;}
.settings-row:first-child{padding-top:0;}
.settings-label{font-size:14px;}
.settings-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:4px;overflow:hidden;}
.stepper button{background:white;border:none;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.stepper button:hover{background:var(--gold-light);color:var(--ink);}
.stepper .sv{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:32px;text-align:center;color:var(--ink);background:var(--paper);height:32px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--line);border-right:1px solid var(--line);}
.info-chip{font-family:'DM Mono',monospace;font-size:10px;background:var(--gold-light);color:var(--ink);padding:2px 8px;border-radius:10px;letter-spacing:.04em;}

</style>
</head>
<body>

<header>
  <div class="logo">Word<em>Wise</em> <small>Слова тижня</small></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="today-label" id="todayLabel"></div>
    <button class="icon-btn" onclick="toggleSettings()" title="Налаштування" id="settingsBtn" style="flex-shrink:0;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- Settings panel -->
<div id="settingsPanel" style="display:none;width:100%;max-width:700px;padding:0 24px 4px;">
  <div class="card" style="padding:18px 20px;">
    <div style="font-family:'Playfair Display',serif;font-size:17px;margin-bottom:14px;">Налаштування</div>
    <div class="settings-row">
      <div>
        <div class="settings-label">Слів на тиждень</div>
        <div class="settings-sub">Скільки слів показувати в тижневому наборі</div>
      </div>
      <div class="stepper">
        <button onclick="changeWeekLimit(-1)">−</button>
        <div class="sv" id="limitDisplay">5</div>
        <button onclick="changeWeekLimit(1)">+</button>
      </div>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">База слів</div>
        <div class="settings-sub">Загальна кількість доступних слів</div>
      </div>
      <div class="info-chip" id="totalWordsChip">1865 слів</div>
    </div>
  </div>
</div>

<div class="tabs-bar">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('week')"><span class="tab-icon">📅</span><span class="tab-lbl">Тиждень</span></button>
    <button class="tab" onclick="switchTab('words')"><span class="tab-icon">📖</span><span class="tab-lbl">Всі слова</span></button>
    <button class="tab" onclick="switchTab('archive')"><span class="tab-icon">🗂</span><span class="tab-lbl">Архів</span></button>
    <button class="tab" onclick="switchTab('quiz')"><span class="tab-icon">🧠</span><span class="tab-lbl">Тест</span></button>
    <button class="tab" onclick="switchTab('verbs')"><span class="tab-icon">🔤</span><span class="tab-lbl">Дієслова</span></button>
  </div>
</div>

<main>
  <!-- WEEKLY VIEW -->
  <div class="view active" id="view-week">

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:20px;">5 слів тижня</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;" id="weekRange"></div>
        </div>
        <div class="week-pill" id="weekCountPill">0 / 5</div>
      </div>
      <div class="days-strip" id="daysStrip"></div>
    </div>

    <!-- Word slots -->
    <div id="wSlots"></div>

    <!-- Add panel -->
    <div class="add-panel">
      <div class="slabel" id="addTitle">Додати слово</div>
      <div class="search-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-inp" id="addInp" placeholder="Пошук серед 1000 слів…" oninput="onAddSearch(this.value)" autocomplete="off">
      </div>
      <div class="add-results" id="addResults"></div>
      <div class="hint" id="addHint">Введіть слово або переклад</div>
    </div>

    <!-- Random button + Archive button -->
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button id="random_btn" class="btn btn-ghost btn-sm" onclick="randomizeWeek()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Випадкові 5 слів
      </button>
      <button class="btn btn-ghost btn-sm" onclick="markLearned()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
        Додати до архіву
      </button>
    </div>

  </div>

  <!-- ALL WORDS VIEW -->
  <div class="view" id="view-words">

    <!-- Controls bar -->
    <div class="card" style="padding:14px 18px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <div style="position:relative;flex:1;min-width:160px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="wlSearch" class="search-inp" style="padding-left:32px;" placeholder="Пошук…" oninput="wlOnSearch(this.value)" autocomplete="off">
        </div>
        <select id="wlPos" onchange="wlOnFilter()" style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border:1.5px solid var(--line);border-radius:4px;background:white;color:var(--ink);cursor:pointer;outline:none;">
          <option value="">Всі частини мови</option>
          <option value="noun">Іменники</option>
          <option value="verb">Дієслова</option>
          <option value="adj">Прикметники</option>
          <option value="adv">Прислівники</option>
          <option value="phrase">Фрази</option>
        </select>
        <select id="wlPerPage" onchange="wlOnPerPage()" style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border:1.5px solid var(--line);border-radius:4px;background:white;color:var(--ink);cursor:pointer;outline:none;">

          <option value="50" selected>50 / стор.</option>
          <option value="100">100 / стор.</option>
        </select>
        <div id="wlCount" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;">1000 слів</div>
      </div>
    </div>

    <!-- Word list -->
    <div id="wlList"></div>

    <!-- Pagination -->
    <div id="wlPager"></div>

  </div>

  <!-- ARCHIVE VIEW -->
  <div class="view" id="view-archive">
    <div id="archiveContent"></div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="view" id="view-quiz">
    <div class="qwrap" id="quizWrap"></div>
  </div>

  <!-- IRREGULAR VERBS VIEW -->

    <div class="card" style="padding:14px 18px;">

      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;" id="ivList"></div>
  </div>
</main>

// CONSTANTS & HELPERS
// ═══════════════════════════════════════════════════════════════
const POS_LABELS = {noun:'Іменник',verb:'Дієслово',adj:'Прикметник',adv:'Прислівник',phrase:'Фраза'};
const DAY_UK = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

function getWeekKey(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  const dow = dt.getDay() || 7;
  dt.setDate(dt.getDate() - dow + 1);
  return dt.toISOString().slice(0,10);
}
function getWeekDays(key) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(key); d.setDate(d.getDate()+i); return d;
  });
}
function fmtD(d) { return d.toLocaleDateString('uk',{day:'numeric',month:'short'}); }
function isToday(d) { return d.toDateString() === new Date().toDateString(); }
function isFuture(d) { const t=new Date(); t.setHours(0,0,0,0); return d>t; }
function findWord(eng) { return WORDS.find(w => w?.[0].toLowerCase()===eng.toLowerCase()); }

// ═══════════════════════════════════════════════════════════════
// INDEXEDDB — архів вивчених слів
// ═══════════════════════════════════════════════════════════════
const DB_NAME    = 'wordwise_db';
const DB_VERSION = 1;
const STORE_WEEKS  = 'weeks';   // архів тижнів
const STORE_BEST   = 'scores';  // рекорди тестів
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      // weeks store: keyPath = weekKey (YYYY-MM-DD)
      if (!d.objectStoreNames.contains(STORE_WEEKS)) {
        const ws = d.createObjectStore(STORE_WEEKS, { keyPath: 'weekKey' });
        ws.createIndex('by_date', 'weekKey');
      }
      // scores store: keyPath = mode_src string
      if (!d.objectStoreNames.contains(STORE_BEST)) {
        d.createObjectStore(STORE_BEST, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function dbPut(store, record) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(record);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}
function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}
function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

// Best scores — thin wrappers over IDB (async)
async function loadBest() {
  const all = await dbGetAll(STORE_BEST);
  return Object.fromEntries(all.map(r => [r.id, r.score]));
}
async function saveBestKey(id, score) {
  await dbPut(STORE_BEST, { id, score });
}

// ─── Archive current week into IDB ──────────────────────────────
// Called automatically when week changes or manually via "Mark as learned"
async function archiveWeek(weekKey, wordsList) {
  if (!wordsList || wordsList.length === 0) return;
  const existing = await dbGet(STORE_WEEKS, weekKey);
  const days   = getWeekDays(weekKey);
  const record = {
    weekKey,
    label   : fmtD(days[0]) + ' – ' + fmtD(days[6]),
    words   : wordsList,
    archived: new Date().toISOString(),
    // preserve existing score if re-archiving
    bestScore: existing?.bestScore || null,
  };
  await dbPut(STORE_WEEKS, record);
}

// ─── Auto-archive past weeks from localStorage ───────────────────
async function migrateOldWeeks() {
  const lsData = JSON.parse(localStorage.getItem('ww_week_data') || '{}');
  for (const [wk, val] of Object.entries(lsData)) {
    if (wk < WEEK_KEY && val.words?.length) {
      const existing = await dbGet(STORE_WEEKS, wk);
      if (!existing) await archiveWeek(wk, val.words);
    }
  }
}

const LIMIT_MAX = 20;

function saveLimit(v) {
  WEEK_LIMIT = v;
  localStorage.setItem('ww_week_limit', v);
  document.getElementById('limitDisplay').textContent = v;
}
function renderWeekLimit() {
  const btn = document.querySelector("#random_btn");
  if (btn) {
    btn.textContent = `Випадкові ${WEEK_LIMIT} слів`;
  }
}

function changeWeekLimit(delta) {
  const n = Math.min(LIMIT_MAX, Math.max(LIMIT_MIN, WEEK_LIMIT + delta));
  if (n === WEEK_LIMIT) return;
  saveLimit(n);
  renderWeekLimit();
  // If current week has fewer words than new limit, pad with random
  const data = loadWD();
  const wk   = data[WEEK_KEY];
  if (wk && wk.words.length < n) {
    const taken = new Set(wk.words.map(w=>w.toLowerCase()));
    const pool  = WORDS.filter(w=>!taken.has(w[0].toLowerCase()));
    const shuffled = pool.sort(()=>Math.random()-.5);
    while (wk.words.length < n && shuffled.length) {
      wk.words.push(shuffled.shift()[0]);
    }
    saveWD(data);
  }
  renderWeek();
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  document.getElementById('totalWordsChip').textContent = WORDS.length + ' слів';
}

function ensureWeek() {
  const d = loadWD();
  renderWeekLimit();
  if (!d[WEEK_KEY]) {
    const shuffled = [...WORDS].sort(() => Math.random()-.5);
    d[WEEK_KEY] = { words: shuffled.slice(0,WEEK_LIMIT).map(w=>w[0]) };
    saveWD(d);
  }
  return d;
}

let curAudio = null;
async function speakWord(word, btn) {
  if(curAudio){ curAudio.pause(); curAudio=null; }
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.querySelectorAll('.icon-btn.playing').forEach(b=>b.classList.remove('playing'));
  if(btn) btn.classList.add('playing');
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if(res.ok) {
      const data = await res.json();
      const url = (data[0]?.phonetics||[]).find(p=>p.audio?.trim())?.audio;
      if(url) {
        const audio = new Audio(url.startsWith('//')?'https:'+url:url);
        curAudio = audio;
        audio.onended = audio.onerror = () => { if(btn)btn.classList.remove('playing'); curAudio=null; };
        await audio.play(); return;
      }
    }
  } catch(e) {}
  if(window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.85;
    u.onend = u.onerror = () => { if(btn)btn.classList.remove('playing'); };
    const go = () => window.speechSynthesis.speak(u);
    window.speechSynthesis.getVoices().length ? go() : (window.speechSynthesis.onvoiceschanged=go, go());
  } else { if(btn) btn.classList.remove('playing'); }
}

// WEEKLY VIEW
// ═══════════════════════════════════════════════════════════════
function renderWeek() {
  const data = ensureWeek();
  const wk   = data[WEEK_KEY];
  const days  = getWeekDays(WEEK_KEY);
  const words = wk.words; // string[]

  // Week range
  document.getElementById('weekRange').textContent = fmtD(days[0]) + ' – ' + fmtD(days[6]);
  document.getElementById('weekCountPill').textContent = words.length + ' / ' + WEEK_LIMIT;

  // Days strip
  document.getElementById('daysStrip').innerHTML = days.map((d,i) => {
    const fut = isFuture(d), tod = isToday(d), sel = i===selDay;
    return `<div class="daydot ${sel?'sel':''} ${tod&&!sel?'today':''} ${fut?'fut':''}" onclick="selDay=${i};expandedSlot=null;renderWeek()">
      <div class="dl">${DAY_UK[i]}</div>
      <div class="dc">${d.getDate()}</div>
    </div>`;
  }).join('');

  // Word slots
  document.getElementById('wSlots').innerHTML = Array.from({length:WEEK_LIMIT},(_,i) => {
    const eng = words[i];
    if(!eng) return `<div class="wslot empty">
      <div class="wslot-num">${i+1}</div>
      <div class="empty-label">Слот вільний — знайдіть слово нижче</div>
    </div>`;
    const w = findWord(eng);
    if(!w) return '';
    const exp = expandedSlot===i;
    return `<div class="wslot">
      <div class="wslot-num">${i+1}</div>
      <div class="wslot-body" onclick="expandedSlot=${exp?'null':i};renderWeek()">
        <div class="wslot-en">${w[0]}</div>
        <div class="wslot-pos">${POS_LABELS[w[1]]||w[1]}</div>
        <div class="wslot-uk">${w[2]}</div>
        ${exp ? `<div class="wslot-detail">
          <p style="font-size:14px;color:var(--muted);font-style:italic;">Натисни 🔊 щоб почути вимову</p>
        </div>` : ''}
      </div>
      <div class="wslot-actions">
        <button class="icon-btn" onclick="speakWord('${esc(w[0])}',this)" title="Вимовити">${SPEAK_SVG}</button>
        <button class="icon-btn danger" onclick="removeWord(${i})" title="Видалити">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  // Add panel
  document.getElementById('addTitle').textContent = `Додати слово (зараз ${words.length} / ${WEEK_LIMIT})`;
  document.getElementById('addInp').disabled = false;
  document.getElementById('addInp').placeholder = 'Пошук серед ' + WORDS.length + ' слів…';
  renderAddResults();
  document.getElementById('addHint').textContent = addQuery ? '' : 'Введіть слово або переклад';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,"\\'"); }

function renderAddResults() {
  const data  = loadWD();
  const taken = data[WEEK_KEY].words;
  const q     = addQuery.toLowerCase().trim();
  const el    = document.getElementById('addResults');
  if(!q) { el.innerHTML=''; return; }
  const hits = WORDS.filter(w =>
    (w[0].toLowerCase().includes(q) || w[2].toLowerCase().includes(q)) && !taken.includes(w[0])
  ).slice(0,14);
  el.innerHTML = hits.length ? hits.map(w => `
    <div class="add-row">
      <div>
        <div class="add-row-en">${w[0]}</div>
        <div class="add-row-uk">${w[2]}</div>
      </div>
      <button class="btn btn-sm" onclick="addWord('${esc(w[0])}')">+ Додати</button>
    </div>`).join('')
    : `<div class="hint">Нічого не знайдено</div>`;
  document.getElementById('addHint').textContent = '';
}

function onAddSearch(val) {
  addQuery = val;
  renderAddResults();
}

function addWord(eng) {
  const data = loadWD();
  const wk   = data[WEEK_KEY];
  if(wk.words.includes(eng)) return;
  if(wk.words.length >= WEEK_LIMIT) {
    saveLimit(Math.min(LIMIT_MAX, WEEK_LIMIT + 1));
    renderWeekLimit();
  }
  wk.words.push(eng);
  saveWD(data);
  expandedSlot = null;
  renderWeek();
}

function removeWord(idx) {
  const data = loadWD();
  data[WEEK_KEY].words.splice(idx,1);
  expandedSlot = null;
  saveWD(data);
  renderWeek();
}

function randomizeWeek() {
  const data = loadWD();
  const shuffled = [...WORDS].sort(()=>Math.random()-.5);
  data[WEEK_KEY] = { words: shuffled.slice(0,WEEK_LIMIT).map(w=>w[0]) };
  expandedSlot = null; addQuery = '';
  document.getElementById('addInp').value = '';
  saveWD(data);
  renderWeek();
}

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${m.svg}</svg>
          <div class="mchip-lbl">${m.lbl}</div>
        </div>`).join('')}
      </div>

      <div class="slabel">Джерело слів</div>
      <div class="src-row">
        <div class="schip ${qz.src==='week'?'active':''}" onclick="setSrc('week',this)">Слова тижня (${week.length})</div>
        <div class="schip ${qz.src==='all'?'active':''}" onclick="setSrc('all',this)">Всі 1000 слів</div>
      </div>

      <div class="stats-row">
        <div class="sbox"><div class="n">${qz.src==='week'?week.length:WORDS.length}</div><div class="l">Слів</div></div>
        <div class="sbox"><div class="n">${bests[bk]||0}%</div><div class="l">Рекорд</div></div>
      </div>

      <button class="btn" style="width:100%;justify-content:center;" onclick="startQuiz()">Почати →</button>
    </div>`;
}

function setMode(id, el) {
  qz.mode = id;
  el.closest('.setup-card').querySelectorAll('.mchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  showSetup();
}
function setSrc(id, el) {
  qz.src = id;
  el.parentElement.querySelectorAll('.schip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  showSetup();
}

function startQuiz() {
  const pool = qz.src==='week' ? weekPool() : [...WORDS];
  if(pool.length<2){ alert('Замало слів. Додайте більше до тижня або оберіть «Всі 1000».'); return; }
  const words = [...pool].sort(()=>Math.random()-.5).slice(0, Math.min(qz.src==='week'?pool.length:20, pool.length));
  qState = { words, idx:0, correct:0, answered:false };
  qz.active = true;
  renderQCard();
}

function renderQCard() {
  const {words,idx} = qState;
  const w   = words[idx];
  const pct = idx/words.length*100;
  const isEn    = qz.mode==='en-uk';
  const isType  = qz.mode==='uk-en';
  const isVoice = qz.mode==='uk-en-voice';

  let body = '';
  if(isEn) {
    body = `
      <div class="qhint">Перекладіть українською</div>
      <div class="qword-row">
        <div class="qword-en">${w[0]}</div>
        <button class="icon-btn" onclick="speakWord('${esc(w[0])}',this)">${SPEAK_SVG}</button>
      </div>
      <div class="qphon">${POS_LABELS[w[1]]||''}</div>
      <input class="qinput" id="qinp" placeholder="Ваш переклад…" autocomplete="off" onkeydown="if(event.key==='Enter')checkAns()">
      <div id="qfb"></div>
      <div class="qnav"><button class="btn" id="qbtn" onclick="checkAns()">Перевірити</button></div>`;
  } else if(isType) {
    body = `
      <div class="qhint">Напишіть англійською</div>
      <div class="qword-uk" style="margin-bottom:6px;">${w[2]}</div>
      <div class="qphon">${POS_LABELS[w[1]]||''}</div>
      <input class="qinput" id="qinp" placeholder="Type in English…" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkAns()">
      <div id="qfb"></div>
      <div class="qnav"><button class="btn" id="qbtn" onclick="checkAns()">Перевірити</button></div>`;
  } else {
    body = `
      <div class="qhint">Вимовте англійською</div>
      <div class="qword-uk" style="margin-bottom:6px;">${w[2]}</div>
      <div class="qphon">${POS_LABELS[w[1]]||''}</div>
      <div class="mic-area">
        <div class="mic-heard" id="micHeard">—</div>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <div class="mic-status" id="micStat">Натисніть мікрофон</div>
      </div>
      <div id="qfb"></div>
      <div class="qnav">
        <button class="btn btn-outline" onclick="skipVoice()">Пропустити</button>
        <button class="btn" id="qbtn" onclick="nextQ()" style="display:none;">Далі →</button>
      </div>`;
  }

  document.getElementById('quizWrap').innerHTML = `
    <div class="qcard fade-up">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="qnum">${idx+1} / ${words.length}</div>
      ${body}
    </div>`;
  setTimeout(()=>document.getElementById('qinp')?.focus(), 80);
}

function checkAns() {
  if(qState.answered){ nextQ(); return; }
  const ans  = (document.getElementById('qinp')?.value||'').trim().toLowerCase();
  const w    = qState.words[qState.idx];
  const isEn = qz.mode==='en-uk';
  const correctRaw = isEn ? w[2] : w[0];
  const correct    = correctRaw.toLowerCase();
  const aTok = ans.split(/[\s,\/]+/).filter(Boolean);
  const cTok = correct.split(/[,\/]+/).map(s=>s.trim()).filter(Boolean);
  let ok = false;
  if(isEn) ok = ans.length>0 && aTok.some(a=>cTok.some(c=>c.includes(a)||a.includes(c)));
  else     ok = ans.length>0 && aTok.some(a=>a===correct||(a.length>=3&&correct.startsWith(a)));
  qState.answered=true;
  if(ok){ qState.correct++; setTimeout(()=>speakWord(w[0],null),200); }
  const fb  = document.getElementById('qfb');
  const btn = document.getElementById('qbtn');
  fb.innerHTML = ok
    ? `<div class="qfb ok">✓ Правильно! <em>${correctRaw}</em></div>`
    : `<div class="qfb no">✗ Відповідь: <em>${correctRaw}</em></div>`;
  btn.textContent = qState.idx+1<qState.words.length ? 'Далі →' : 'Результат →';
}

// ── Voice ─────────────────────────────────────────────────────
function toggleMic(){ micOn ? stopMic() : startMic(); }

function startMic(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Голосовий режим потребує Chrome або Edge.'); return; }
  recog = new SR(); recog.lang='en-US'; recog.interimResults=true; recog.maxAlternatives=3;
  micOn=true;
  const mb=document.getElementById('micBtn'), ms=document.getElementById('micStat');
  if(mb) mb.classList.add('on');
  if(ms) ms.textContent='Слухаю…';
  recog.onresult=(e)=>{
    const finals  = Array.from(e.results).filter(r=>r.isFinal).map(r=>r[0].transcript).join(' ');
    const interim = Array.from(e.results).filter(r=>!r.isFinal).map(r=>r[0].transcript).join(' ');
    const hd=document.getElementById('micHeard'); if(hd) hd.textContent=finals||interim||'…';
    if(finals) checkVoice(finals);
  };
  recog.onerror=(e)=>{ micOn=false; const mb=document.getElementById('micBtn'); if(mb)mb.classList.remove('on'); const ms=document.getElementById('micStat'); if(ms)ms.textContent='Помилка: '+e.error; };
  recog.onend=()=>{ micOn=false; const mb=document.getElementById('micBtn'); if(mb)mb.classList.remove('on'); if(!qState.answered){ const ms=document.getElementById('micStat'); if(ms)ms.textContent='Спробуйте ще раз'; } };
  recog.start();
}

function stopMic(){ if(recog){try{recog.stop();}catch(e){}} micOn=false; const mb=document.getElementById('micBtn'); if(mb)mb.classList.remove('on'); }

function checkVoice(spoken){
  if(qState.answered) return;
  stopMic();
  const w=qState.words[qState.idx];
  const target=w[0].toLowerCase(), said=spoken.trim().toLowerCase();
  const ok=said.includes(target)||(said.split(' ')[0].length>=3&&target.startsWith(said.split(' ')[0]));
  qState.answered=true;
  if(ok){ qState.correct++; speakWord(w[0],null); }
  const ms=document.getElementById('micStat'); if(ms) ms.textContent='Ви сказали: "'+spoken+'"';
  const fb=document.getElementById('qfb');
  fb.innerHTML=ok
    ?`<div class="qfb ok">✓ Правильно! <em>${w[0]}</em></div>`
    :`<div class="qfb no">✗ Відповідь: <em>${w[0]}</em> <button class="icon-btn" style="display:inline-flex;" onclick="speakWord('${esc(w[0])}',this)">${SPEAK_SVG}</button></div>`;
  const skip=document.querySelector('.btn-outline'); if(skip) skip.style.display='none';
  const nb=document.getElementById('qbtn'); if(nb){ nb.style.display='inline-flex'; nb.textContent=qState.idx+1<qState.words.length?'Далі →':'Результат →'; }
}

function skipVoice(){ stopMic(); checkVoice('__skip__'); }

function nextQ(){
  stopMic(); qState.idx++; qState.answered=false;
  qState.idx>=qState.words.length ? finishQuiz() : renderQCard();
}

async function finishQuiz(){
  stopMic(); qz.active=false;
  const pct=Math.round(qState.correct/qState.words.length*100);
  const bk=bestKey();
  const bests=await loadBest();
  if(pct>(bests[bk]||0)){ await saveBestKey(bk,pct); bests[bk]=pct; }
  // If quiz was on week words and score >= 60%, auto-archive
  if(qz.src==='week' && pct>=60){
    const data=loadWD();
    const wk=data[WEEK_KEY];
    if(wk?.words?.length){
      await archiveWeek(WEEK_KEY,wk.words);
      // store best score in archived record too
      const rec=await dbGet(STORE_WEEKS,WEEK_KEY);
      if(rec && (!rec.bestScore || pct>rec.bestScore)){
        rec.bestScore=pct; await dbPut(STORE_WEEKS,rec);
      }
    }
  }
  const emoji=pct>=80?'🌟':pct>=60?'📚':'💪';
  const modeLabel=qz.mode==='en-uk'?'EN → Укр':qz.mode==='uk-en'?'Укр → EN (друк)':'Укр → EN (голос)';
  const srcLabel=qz.src==='week'?'слова тижня':'всі 1000';
  const archiveNote=qz.src==='week'&&pct>=60?'<div style="font-family:DM Mono,monospace;font-size:10px;color:var(--sage);margin-bottom:12px;">✓ Тиждень збережено в архів</div>':''
  document.getElementById('quizWrap').innerHTML=`
    <div class="result-card fade-up">
      <div class="result-emoji">${emoji}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-sub">${qState.correct} з ${qState.words.length} правильних · ${modeLabel} · ${srcLabel}</div>
      <div class="result-rec">🏆 Рекорд: ${bests[bk]}%</div>
      ${archiveNote}
      <div class="qnav">
        <button class="btn" onclick="startQuiz()">Ще раз</button>
        <button class="btn btn-outline" onclick="showSetup()">Налаштування</button>
      </div>
    </div>`;
}

// MARK AS LEARNED (manual archive — daily entry)
// ═══════════════════════════════════════════════════════════════
async function markLearned() {
  const data = loadWD();
  const wk   = data[WEEK_KEY];
  if (!wk?.words?.length) { alert('Немає слів для архівування.'); return; }

  // daily key: d_YYYY-MM-DD (avoids collision with weekly Monday keys)
  const todayKey   = 'd_' + TODAY.toISOString().slice(0, 10);
  const todayLabel = TODAY.toLocaleDateString('uk', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

  const existing = await dbGet(STORE_WEEKS, todayKey);
  await dbPut(STORE_WEEKS, {
    weekKey  : todayKey,
    label    : todayLabel,
    words    : [...wk.words],
    archived : new Date().toISOString(),
    bestScore: existing?.bestScore || null,
  });
  showToast('✓ Слова збережено в архів на сьогодні');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;font-family:DM Mono,monospace;font-size:12px;padding:10px 20px;border-radius:4px;z-index:9999;animation:fadeUp .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2);';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

// ARCHIVE VIEW
// ═══════════════════════════════════════════════════════════════
let arcFilter = '';
let arcSearch = '';

async function renderArchive() {
  const el = document.getElementById('archiveContent');
  el.innerHTML = '<div class="arc-empty">Завантаження…</div>';

  let all = await dbGetAll(STORE_WEEKS);
  // sort newest first (strip d_ prefix for comparison so daily entries sort correctly)
  const sortKey = k => k.startsWith('d_') ? k.slice(2) : k;
  all.sort((a,b) => sortKey(b.weekKey).localeCompare(sortKey(a.weekKey)));

  // apply search filter
  if (arcSearch) {
    const q = arcSearch.toLowerCase();
    all = all.map(rec => ({
      ...rec,
      words: rec.words.filter(eng => {
        const w = findWord(eng);
        return w && (w[0].toLowerCase().includes(q) || w[2].toLowerCase().includes(q));
      })
    })).filter(r => r.words.length > 0);
  }

  if (!all.length) {
    el.innerHTML = `
      <div class="arc-empty">Архів порожній.<br><small style="font-size:14px;color:var(--muted);">Пройдіть тест або натисніть «Додати до архіву».</small></div>`;
    return;
  }

  const totalWords = await countTotalArchived();
  const totalWeeks = (await dbGetAll(STORE_WEEKS)).length;

  el.innerHTML = `
    <div class="arc-stats">
      <div class="arc-stat"><div class="n">${totalWeeks}</div><div class="l">Записів</div></div>
      <div class="arc-stat"><div class="n">${totalWords}</div><div class="l">Слів вивчено</div></div>
    </div>

    <div class="arc-toolbar">
      <input class="arc-search" placeholder="Пошук у архіві…" value="${arcSearch}" oninput="arcSearch=this.value;renderArchive()">
      <button class="btn btn-ghost btn-sm" onclick="if(confirm('Очистити весь архів?'))clearArchive()">Очистити</button>
    </div>

    ${all.map(rec => {
      const words = rec.words;
      return `
      <div class="arc-week">
        <div class="arc-week-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div class="wlabel">${rec.label}</div>
            ${rec.bestScore ? `<div style="font-family:DM Mono,monospace;font-size:10px;color:var(--gold);margin-top:2px;">🏆 ${rec.bestScore}%</div>` : ''}
          </div>
          <div class="wmeta">
            <span class="wcount">${words.length} слів</span>
            <span style="color:var(--muted);">▾</span>
            <button class="del-week-btn" title="Видалити тиждень" onclick="event.stopPropagation();deleteArchiveWeek('${rec.weekKey}')">×</button>
          </div>
        </div>
        <div class="arc-week-body">
          ${words.map(eng => {
            const w = findWord(eng);
            if (!w) return '';
            return `<div class="arc-word-row">
              <div>
                <div class="arc-word-en">
                  ${w[0]}
                  <button class="icon-btn" style="width:22px;height:22px;" onclick="speakWord('${w[0].replace(/'/g,"\'")}',this)">${SPEAK_SVG}</button>
                </div>
                <div class="arc-word-pos">${POS_LABELS[w[1]]||w[1]}</div>
              </div>
              <div class="arc-word-uk">${w[2]}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

async function countTotalArchived() {
  const all = await dbGetAll(STORE_WEEKS);
  return all.reduce((sum, r) => sum + (r.words?.length||0), 0);
}

async function deleteArchiveWeek(weekKey) {
  if (!confirm('Видалити цей тиждень з архіву?')) return;
  await dbDelete(STORE_WEEKS, weekKey);
  renderArchive();
}

async function clearArchive() {
  const all = await dbGetAll(STORE_WEEKS);
  for (const r of all) await dbDelete(STORE_WEEKS, r.weekKey);
  renderArchive();
}

// ALL WORDS VIEW — paginated list
// ═══════════════════════════════════════════════════════════════
const POS_FULL = {noun:'Іменник',verb:'Дієслово',adj:'Прикметник',adv:'Прислівник',phrase:'Фраза'};
let wlPage    = 1;
let wlPerPage = 50;
let wlSearch  = '';
let wlPos     = '';
let wlWeekSet = new Set();   // English words in current week

function wlOnSearch(v) { wlSearch=v; wlPage=1; renderWordList(); }
function wlOnFilter()  { wlPos=document.getElementById('wlPos').value; wlPage=1; renderWordList(); }
function wlOnPerPage() { wlPerPage=+document.getElementById('wlPerPage').value; wlPage=1; renderWordList(); }

function renderWordList() {
  // update week set
  const wd = loadWD();
  wlWeekSet = new Set((wd[WEEK_KEY]?.words || []).map(s=>s.toLowerCase()));

  // filter
  const q = wlSearch.toLowerCase().trim();
  const filtered = WORDS.filter(w => {
    if (wlPos && w[1] !== wlPos) return false;
    if (q && !w[0].toLowerCase().includes(q) && !w[2].toLowerCase().includes(q)) return false;
    return true;
  });

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / wlPerPage));
  if (wlPage > totalPages) wlPage = totalPages;

  const start = (wlPage-1) * wlPerPage;
  const slice = filtered.slice(start, start + wlPerPage);

  // count badge
  document.getElementById('wlCount').textContent = total + ' слів';

  // word cards
  document.getElementById('wlList').innerHTML =
    slice.length === 0
      ? '<div style="text-align:center;padding:40px;font-family:Playfair Display,serif;font-style:italic;color:var(--muted);font-size:18px;">Нічого не знайдено</div>'
      : `<div class="wl-grid">${slice.map(w => {
          const inWeek = wlWeekSet.has(w[0].toLowerCase());
          const eWord  = w[0].replace(/'/g,"\'");
          return `<div class="wl-card">
            <div class="wl-en">
              ${w[0]}
              <button class="icon-btn" style="width:22px;height:22px;flex-shrink:0;" onclick="speakWord('${eWord}',this)">${SPEAK_SVG}</button>
            </div>
            <div class="wl-pos">${POS_FULL[w[1]]||w[1]}</div>
            <div class="wl-uk">${w[2]}</div>
            ${inWeek
              ? '<div class="wl-week-badge">✓ Цього тижня</div>'
              : `<button class="btn btn-ghost btn-sm" style="font-size:9px;padding:4px 8px;margin-top:4px;align-self:flex-start;" onclick="wlAddToWeek('${eWord}')">+ До тижня</button>`
            }
          </div>`;
        }).join('')}</div>`;

  // pagination
  renderPager(totalPages, total, start, slice.length);
}

function renderPager(totalPages, total, start, count) {
  const end = start + count;
  if (totalPages <= 1) {
    document.getElementById('wlPager').innerHTML =
      `<div class="pg-info">${total} слів</div>`;
    return;
  }

  // build page numbers: always show first, last, current ±2, ellipsis between
  const pages = new Set([1, totalPages, wlPage]);
  for (let i = Math.max(1, wlPage-2); i <= Math.min(totalPages, wlPage+2); i++) pages.add(i);
  const sorted = [...pages].sort((a,b)=>a-b);

  let btns = '';
  // Prev
  btns += `<button class="pg-btn" ${wlPage===1?'disabled':''} onclick="wlGo(${wlPage-1})">‹</button>`;

  let prev = 0;
  for (const p of sorted) {
    if (prev && p - prev > 1) btns += `<span class="pg-ellipsis">…</span>`;
    btns += `<button class="pg-btn ${p===wlPage?'active':''}" onclick="wlGo(${p})">${p}</button>`;
    prev = p;
  }

  // Next
  btns += `<button class="pg-btn" ${wlPage===totalPages?'disabled':''} onclick="wlGo(${wlPage+1})">›</button>`;

  document.getElementById('wlPager').innerHTML =
    `<div class="pager">${btns}</div>
     <div class="pg-info" style="margin-top:8px;">${start+1}–${end} з ${total} слів · стор. ${wlPage} / ${totalPages}</div>`;
}

function wlGo(p) {
  wlPage = p;
  renderWordList();
  // scroll to top of list
  document.getElementById('wlList').scrollIntoView({ behavior:'smooth', block:'start' });
}

function wlAddToWeek(eng) {
  const data = loadWD();
  const wk   = data[WEEK_KEY];
  if (!wk.words.includes(eng)) {
    if (wk.words.length >= WEEK_LIMIT) {
      saveLimit(Math.min(LIMIT_MAX, WEEK_LIMIT + 1));
      renderWeekLimit();
    }
    wk.words.push(eng);
    saveWD(data);
    showToast('✓ «' + eng + '» додано до тижня');
    renderWordList(); // refresh badges
  }
}

function ivSpeak(form) {
  return form.split(' / ')[0].trim().replace(/'/g, "\\'");
}

function ivRow(v) {
  const SZ = 'style="width:20px;height:20px;flex-shrink:0;"';
  return `<tr>
    <td><span class="iv-base">${v[0]}</span> <button class="icon-btn" ${SZ} onclick="speakWord('${ivSpeak(v[0])}',this)">${SPEAK_SVG}</button></td>
    <td><span class="iv-form">${v[1]}</span> <button class="icon-btn" ${SZ} onclick="speakWord('${ivSpeak(v[1])}',this)">${SPEAK_SVG}</button></td>
    <td><span class="iv-form">${v[2]}</span> <button class="icon-btn" ${SZ} onclick="speakWord('${ivSpeak(v[2])}',this)">${SPEAK_SVG}</button></td>
    <td><span class="iv-uk">${v[3]}</span></td>
  </tr>`;
}

function renderIrregVerbs() {
  const q = (document.getElementById('ivSearch')?.value || '').toLowerCase().trim();
  const filtered = q
    ? IRREG_VERBS.filter(v =>
        v[0].includes(q) || v[1].includes(q) || v[2].includes(q) || v[3].toLowerCase().includes(q))
    : IRREG_VERBS;

  document.getElementById('ivCount').textContent = filtered.length + ' дієслів';

  if (filtered.length === 0) {
    document.getElementById('ivList').innerHTML =
      '<div style="text-align:center;padding:40px;font-family:Playfair Display,serif;font-style:italic;color:var(--muted);font-size:18px;">Нічого не знайдено</div>';
    return;
  }

  const THEAD = '<table class="iv-table"><thead><tr>'
    + '<th>Base form</th><th>Past Simple</th><th>Past Participle</th><th>Переклад</th>'
    + '</tr></thead><tbody>';

  let html = THEAD;

  if (!q) {
    const groups = {};
    filtered.forEach(v => {
      const letter = v[0][0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(v);
    });
    for (const letter of Object.keys(groups).sort()) {
      html += `<tr class="iv-letter-row"><td colspan="4" class="iv-letter-hdr">${letter}</td></tr>`;
      for (const v of groups[letter]) html += ivRow(v);
    }
  } else {
    for (const v of filtered) html += ivRow(v);
  }

  html += '</tbody></table>';
  document.getElementById('ivList').innerHTML = html;
}
